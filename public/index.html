<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Examples - Character Voice Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    /* Setup Panel */
    .setup-panel {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .setup-panel h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #ccc;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      flex: 1;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4a9eff;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .image-upload {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .image-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #222;
      border: 2px dashed #444;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview span {
      font-size: 24px;
      color: #555;
    }

    .btn {
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #3a8eef; }
    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .btn-generate {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-top: 8px;
    }

    /* Progress */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #222;
      border-radius: 2px;
      margin-top: 16px;
      display: none;
    }

    .progress-bar.active { display: block; }

    .progress-fill {
      height: 100%;
      background: #4a9eff;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .status-text {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      text-align: center;
      display: none;
    }

    .status-text.active { display: block; }

    /* Chat View */
    .chat-view {
      display: none;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
    }

    .chat-view.active { display: block; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
      background: #1a1a1a;
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      overflow: hidden;
    }

    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-header-name {
      font-weight: 500;
      font-size: 16px;
    }

    .chat-controls {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .btn-small {
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-small:hover { background: #333; }
    .btn-small.active { background: #4a9eff; color: #fff; }

    .chat-messages {
      padding: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .message {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .message.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #888;
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .message-bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.character .message-bubble {
      background: #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .message.user .message-bubble {
      background: #1a3a5c;
      border-bottom-right-radius: 4px;
    }

    .message .audio-indicator {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      cursor: pointer;
    }

    .message .audio-indicator:hover { color: #4a9eff; }
    .message .audio-indicator.playing { color: #4a9eff; }

    /* Back button */
    .btn-back {
      background: none;
      border: 1px solid #333;
      color: #888;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .btn-back:hover { border-color: #555; color: #ccc; }

    .voice-preview {
      display: inline-block;
      margin-left: 8px;
      cursor: pointer;
      font-size: 12px;
      color: #4a9eff;
    }

    .voice-preview:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Setup View -->
    <div id="setupView">
      <h1>Golden Examples</h1>
      <p class="subtitle">Generate character voice conversations from scripts</p>

      <div class="setup-panel">
        <h2>Project</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Project Name</label>
            <input type="text" id="projectName" placeholder="e.g. Figaro_cat_female">
          </div>
          <div class="form-group">
            <label>Character Image</label>
            <div class="image-upload">
              <div class="image-preview" id="imagePreview" onclick="document.getElementById('imageInput').click()">
                <span>+</span>
              </div>
              <input type="file" id="imageInput" accept="image/*" style="display:none">
              <span style="font-size:13px; color:#666">Click to upload</span>
            </div>
          </div>
        </div>
      </div>

      <div class="setup-panel">
        <h2>Voices</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Character Voice</label>
            <select id="characterVoice"><option value="">Loading voices...</option></select>
            <span class="voice-preview" id="previewCharacter" onclick="previewVoice('characterVoice')">Preview</span>
          </div>
          <div class="form-group">
            <label>User Voice</label>
            <select id="userVoice"><option value="">Loading voices...</option></select>
            <span class="voice-preview" id="previewUser" onclick="previewVoice('userVoice')">Preview</span>
          </div>
        </div>
      </div>

      <div class="setup-panel">
        <h2>Script</h2>
        <textarea id="scriptInput" placeholder="CHARACTER: Hello! I'm Figaro, a friendly cat who loves to chat.
USER: Hi Figaro! How are you today?
CHARACTER: I'm purr-fect, thank you for asking! What would you like to talk about?
USER: Tell me about your favorite things.
CHARACTER: Oh, I love sunny windowsills, tuna treats, and long naps!"></textarea>
      </div>

      <button class="btn btn-generate" id="generateBtn" onclick="generate()">Generate Conversation</button>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="status-text" id="statusText"></div>
    </div>

    <!-- Chat View -->
    <div id="chatView" class="chat-view">
      <div class="chat-header">
        <div class="chat-header-avatar" id="chatAvatar"></div>
        <div class="chat-header-name" id="chatName"></div>
        <div class="chat-controls">
          <button class="btn-small" id="playAllBtn" onclick="playAll()">Play All</button>
          <button class="btn-small" onclick="backToSetup()">Edit Script</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
    </div>
  </div>

  <script>
    let voices = [];
    let generatedLines = [];
    let characterImageUrl = null;
    let currentAudio = null;
    let isPlayingAll = false;

    // Load voices on startup
    async function loadVoices() {
      try {
        const res = await fetch('/api/voices');
        voices = await res.json();

        const charSelect = document.getElementById('characterVoice');
        const userSelect = document.getElementById('userVoice');

        charSelect.innerHTML = '<option value="">Select a voice...</option>';
        userSelect.innerHTML = '<option value="">Select a voice...</option>';

        voices.forEach(v => {
          const opt = `<option value="${v.voice_id}">${v.name} (${v.gender}, ${v.accent})</option>`;
          charSelect.innerHTML += opt;
          userSelect.innerHTML += opt;
        });
      } catch (err) {
        console.error('Failed to load voices:', err);
      }
    }

    // Preview a voice
    function previewVoice(selectId) {
      const voiceId = document.getElementById(selectId).value;
      if (!voiceId) return;
      const voice = voices.find(v => v.voice_id === voiceId);
      if (voice?.preview_url) {
        if (currentAudio) currentAudio.pause();
        currentAudio = new Audio(voice.preview_url);
        currentAudio.play();
      }
    }

    // Handle image upload
    document.getElementById('imageInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}">`;
        characterImageUrl = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Parse script into lines
    function parseScript(text) {
      const lines = [];
      const rawLines = text.split('\n').filter(l => l.trim());
      for (const line of rawLines) {
        const match = line.match(/^(USER|CHARACTER)\s*:\s*(.+)/i);
        if (match) {
          lines.push({
            speaker: match[1].toUpperCase(),
            text: match[2].trim()
          });
        }
      }
      return lines;
    }

    // Generate audio
    async function generate() {
      const projectName = document.getElementById('projectName').value.trim();
      const characterVoiceId = document.getElementById('characterVoice').value;
      const userVoiceId = document.getElementById('userVoice').value;
      const scriptText = document.getElementById('scriptInput').value.trim();

      if (!projectName || !characterVoiceId || !userVoiceId || !scriptText) {
        alert('Please fill in all fields');
        return;
      }

      const lines = parseScript(scriptText);
      if (lines.length === 0) {
        alert('No valid lines found. Use format:\nCHARACTER: text\nUSER: text');
        return;
      }

      const btn = document.getElementById('generateBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const statusText = document.getElementById('statusText');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      progressBar.classList.add('active');
      statusText.classList.add('active');
      statusText.textContent = `Generating ${lines.length} audio clips...`;

      // Upload image if provided
      if (characterImageUrl) {
        const imageInput = document.getElementById('imageInput');
        const file = imageInput.files[0];
        if (file) {
          await fetch(`/api/upload-image?project=${encodeURIComponent(projectName)}`, {
            method: 'POST',
            headers: { 'Content-Type': file.type },
            body: file
          });
        }
      }

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lines, characterVoiceId, userVoiceId, projectName })
        });

        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        progressFill.style.width = '100%';
        statusText.textContent = 'Done! Loading chat view...';
        generatedLines = data.lines;

        setTimeout(() => showChatView(projectName), 500);
      } catch (err) {
        alert('Generation failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Conversation';
        progressBar.classList.remove('active');
        statusText.classList.remove('active');
      }
    }

    // Show chat view
    function showChatView(projectName) {
      document.getElementById('setupView').style.display = 'none';
      const chatView = document.getElementById('chatView');
      chatView.classList.add('active');

      document.getElementById('chatName').textContent = projectName.replace(/_/g, ' ');

      const avatarEl = document.getElementById('chatAvatar');
      if (characterImageUrl) {
        avatarEl.innerHTML = `<img src="${characterImageUrl}">`;
      }

      const messagesEl = document.getElementById('chatMessages');
      messagesEl.innerHTML = '';

      generatedLines.forEach((line, i) => {
        const msgEl = document.createElement('div');
        msgEl.className = `message ${line.speaker.toLowerCase()}`;
        msgEl.innerHTML = `
          <div class="message-avatar">
            ${line.speaker === 'CHARACTER' && characterImageUrl
              ? `<img src="${characterImageUrl}">`
              : line.speaker === 'CHARACTER' ? 'C' : 'U'}
          </div>
          <div>
            <div class="message-bubble">${line.text}</div>
            <div class="audio-indicator" data-index="${i}" onclick="playLine(${i})">
              ▶ Play audio
            </div>
          </div>
        `;
        messagesEl.appendChild(msgEl);

        // Animate in with delay
        setTimeout(() => msgEl.classList.add('visible'), i * 100);
      });
    }

    // Play a single line
    function playLine(index) {
      if (currentAudio) {
        currentAudio.pause();
        document.querySelectorAll('.audio-indicator').forEach(el => {
          el.classList.remove('playing');
          el.textContent = '▶ Play audio';
        });
      }

      const line = generatedLines[index];
      currentAudio = new Audio(line.audioUrl);

      const indicator = document.querySelector(`.audio-indicator[data-index="${index}"]`);
      indicator.classList.add('playing');
      indicator.textContent = '◼ Playing...';

      currentAudio.onended = () => {
        indicator.classList.remove('playing');
        indicator.textContent = '▶ Play audio';
      };

      currentAudio.play();
      return currentAudio;
    }

    // Play all lines sequentially
    async function playAll() {
      const btn = document.getElementById('playAllBtn');

      if (isPlayingAll) {
        isPlayingAll = false;
        if (currentAudio) currentAudio.pause();
        btn.classList.remove('active');
        btn.textContent = 'Play All';
        document.querySelectorAll('.audio-indicator').forEach(el => {
          el.classList.remove('playing');
          el.textContent = '▶ Play audio';
        });
        return;
      }

      isPlayingAll = true;
      btn.classList.add('active');
      btn.textContent = 'Stop';

      for (let i = 0; i < generatedLines.length; i++) {
        if (!isPlayingAll) break;

        const audio = playLine(i);
        await new Promise(resolve => {
          audio.onended = () => {
            const indicator = document.querySelector(`.audio-indicator[data-index="${i}"]`);
            indicator.classList.remove('playing');
            indicator.textContent = '▶ Play audio';
            resolve();
          };
        });
      }

      isPlayingAll = false;
      btn.classList.remove('active');
      btn.textContent = 'Play All';
    }

    function backToSetup() {
      document.getElementById('setupView').style.display = 'block';
      document.getElementById('chatView').classList.remove('active');
      if (currentAudio) currentAudio.pause();
      isPlayingAll = false;
    }

    loadVoices();
  </script>
</body>
</html>
